// ── MOTOR DE REGLAS ────────────────────────
function sugerirModelos(c){
  const s=new Set();
  const{tipo_cliente:t,regimen_fiscal:r,situacion_iva:iva,tiene_trabajadores:tr,tiene_alquileres:al}=c;
  if(iva!=='exento'&&iva!=='no_sujeto')s.add('303');
  if(t==='autonomo'){if(r==='estimacion_directa')s.add('130');if(r==='modulos')s.add('131');}
  if(t==='sociedad')s.add('200');
  if(tr){s.add('111');s.add('190');}
  if(al){s.add('115');s.add('180');}
  if(iva!=='exento'&&iva!=='no_sujeto')s.add('390');
  return[...s];
}
function calcularSemaforo(obs,pres){
  const act=obs.filter(o=>o.activo&&o.origen!=='excluido_manual');
  if(!act.length)return'azul';
  // Solo modelos trimestrales/mensuales afectan al semáforo del periodo actual
  const ANUALES=['390','190','180','347','200'];
  const actPeriodo=act.filter(o=>!ANUALES.includes(o.modelos_fiscales?.codigo||''));
  const actTodos=act;
  // Si todos presentados (incluyendo anuales si los hay) -> verde
  if(actPeriodo.length===0&&actTodos.every(o=>pres.find(p=>p.modelo_id===o.modelo_id)?.estado==='presentado'))return'verde';
  if(actPeriodo.length>0&&actPeriodo.every(o=>{const p=pres.find(p=>p.modelo_id===o.modelo_id);return p&&(p.estado==='presentado'||p.estado==='exento');}))return'verde';
  // Also check if all period models have no obligations -> verde
  if(actPeriodo.length===0)return'verde';
  // Fechas correctas 1T 2026: domiciliacion 15 abril, general 20 abril
  const hoy=new Date();
  const fechaUrgente=new Date('2026-04-20');
  const dias=Math.ceil((fechaUrgente-hoy)/86400000);
  if(actPeriodo.some(o=>{const p=pres.find(p=>p.modelo_id===o.modelo_id);return(!p||p.estado==='pendiente')&&dias<=7;}))return'rojo';
  if(actPeriodo.some(o=>{const p=pres.find(p=>p.modelo_id===o.modelo_id);return!p||p.estado==='pendiente';}))return'naranja';
  return'amarillo';
}
function diasHasta(f){return Math.ceil((new Date(f)-new Date())/86400000);}

function goTo(scr,data={}){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('s-'+scr)?.classList.add('active');
  document.querySelector(`[data-screen="${scr}"]`)?.classList.add('active');
  S.screen=scr;
  if(data.c)S.clienteActual=data.c;
  const fab=document.getElementById('fab');
  if(fab)fab.style.display=scr==='clientes'?'flex':'none';
  const fabRenta=document.getElementById('fab-renta');
  if(fabRenta)fabRenta.style.display=scr==='renta'?'flex':'none';
  render();
}
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>goTo(n.dataset.screen)));

function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;setTimeout(()=>t.className='',3000);}
function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('show');}
function hideModal(){document.getElementById('modal-overlay').classList.remove('show');}

// ── DATA ───────────────────────────────────
async function cargarDatos(){
  S.loading=true;render();
  try{
    const[{data:cl},{data:mod},{data:camp}]=await Promise.all([
      sb.from('clientes').select('*').order('nombre_razon_social'),
      sb.from('modelos_fiscales').select('*').order('codigo'),
      sb.from('campanas').select('*').eq('activa',true).single(),
    ]);
    S.clientes=cl||[];S.modelos=mod||[];S.campana=camp||null;
  }catch(e){toast('Error cargando datos','error');}
  S.loading=false;render();
}
async function guardarCliente(datos){
  const{error,data}=await sb.from('clientes').insert([datos]).select().single();
  if(error)throw error;
  const mods=S.modelos.filter(m=>sugerirModelos(datos).includes(m.codigo));
  if(mods.length&&data)await sb.from('obligaciones_cliente').insert(mods.map(m=>({cliente_id:data.id,modelo_id:m.id,origen:'sugerido_auto',activo:true})));
  return data;
}
async function updateCliente(id,d){const{error}=await sb.from('clientes').update(d).eq('id',id);if(error)throw error;}
async function deleteCliente(id){const{error}=await sb.from('clientes').delete().eq('id',id);if(error)throw error;}
async function cargarFicha(id){
  const campId = S.campana?.id;
  let presQuery = sb.from('presentaciones').select('*,modelos_fiscales(*)').eq('cliente_id',id);
  if(campId) presQuery = presQuery.eq('campana_id', campId);
  const[{data:ob},{data:pr},{data:re}]=await Promise.all([
    sb.from('obligaciones_cliente').select('*,modelos_fiscales(*)').eq('cliente_id',id),
    presQuery,
    sb.from('recordatorios').select('*').eq('cliente_id',id).order('created_at',{ascending:false}).limit(5),
  ]);
  return{obs:ob||[],pres:pr||[],recs:re||[]};
}
async function setEstado(cid,mid,estado){
  const campId=S.campana?.id;
  if(!campId){toast('Sin campaña activa','error');return;}
  try {
    const{data:ex}=await sb.from('presentaciones').select('id').eq('cliente_id',cid).eq('modelo_id',mid).eq('campana_id',campId).maybeSingle();
    const p={estado,...(estado==='presentado'?{fecha_presentacion:new Date().toISOString()}:{})};
    if(ex){
      await sb.from('presentaciones').update(p).eq('id',ex.id);
    } else {
      await sb.from('presentaciones').insert([{cliente_id:cid,modelo_id:mid,campana_id:campId,...p}]);
    }
    // Update semaforo in clientes table
    const{data:obsCliente}=await sb.from('obligaciones_cliente').select('*,modelos_fiscales(*)').eq('cliente_id',cid);
    const{data:presCliente}=await sb.from('presentaciones').select('*').eq('cliente_id',cid).eq('campana_id',campId);
    const nuevoSem=calcularSemaforo(obsCliente||[],presCliente||[]);
    await sb.from('clientes').update({semaforo:nuevoSem}).eq('id',cid);
    // Update local state
    const idx=S.clientes.findIndex(x=>x.id===cid);
    if(idx>=0)S.clientes[idx].semaforo=nuevoSem;
    if(S.clienteActual?.id===cid)S.clienteActual={...S.clienteActual,semaforo:nuevoSem};
  } catch(e) {
    console.error('setEstado error:',e);
    throw e;
  }
}

// ══════════════════════════════════════════════════════
function abrirImportador(){
  ocrData=null;
  showModal(`
    <div class="modal-title">📋 Importar Modelo 036</div>
    <div class="modal-sub">Adjunta el PDF descargado de la AEAT o una foto del documento</div>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-title">Toca para adjuntar el 036</div>
      <div class="upload-sub">Acepta PDF y cualquier formato de imagen</div>
    </div>
    <div style="padding:10px 14px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius-sm);font-size:11px">
      <span style="color:var(--yellow);font-weight:600">⚠️ Revisa siempre los datos antes de guardar.</span>
      <span style="color:var(--text2)"> Claude extrae automáticamente pero tú validas.</span>
    </div>
  `);
  document.getElementById('file-input').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    e.target.value='';
    await procesarOCR(f);
  };
}

async function procesarOCR(file){
  const apiKey=getKey();
  if(!apiKey){toast('Configura tu API key en Config ⚙️','error');return;}

  // Pantalla de progreso
  showModal(`
    <div class="modal-title">⏳ Analizando el 036</div>
    <div class="modal-sub" style="margin-bottom:16px">${file.name}</div>
    <div id="pasos">
      <div class="ocr-step"><div class="step-icon active" id="ico1">📂</div><div><div style="font-size:13px;font-weight:500">Leyendo archivo</div><div style="font-size:11px;color:var(--text2)">Preparando para Claude...</div></div></div>
      <div class="ocr-step"><div class="step-icon pending" id="ico2">🔍</div><div><div style="font-size:13px;font-weight:500">Analizando documento</div><div style="font-size:11px;color:var(--text2)">Claude lee el 036...</div></div></div>
      <div class="ocr-step"><div class="step-icon pending" id="ico3">🧩</div><div><div style="font-size:13px;font-weight:500">Extrayendo campos</div><div style="font-size:11px;color:var(--text2)">Nombre, NIF, IAE, régimen...</div></div></div>
      <div class="ocr-step"><div class="step-icon pending" id="ico4">✅</div><div><div style="font-size:13px;font-weight:500">Preparando formulario</div><div style="font-size:11px;color:var(--text2)">Listo para revisar</div></div></div>
    </div>
  `);

  function paso(done,next){
    const d=document.getElementById(done);
    if(d){d.className='step-icon done';d.textContent='✓';}
    if(next){const n=document.getElementById(next);if(n)n.className='step-icon active';}
  }

  try{
    // 1. Base64
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    paso('ico1','ico2');

    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const mime=isPDF?'application/pdf':(file.type||'image/jpeg');

    // 2. Llamada a Claude
    const prompt=`Eres experto en fiscalidad española. Analiza este Modelo 036 de la AEAT y extrae los datos.
Responde ÚNICAMENTE con un JSON válido, sin markdown ni texto adicional:

{
  "nombre_razon_social": "nombre completo tal como aparece en el 036",
  "nif_cif": "NIF o CIF sin espacios",
  "email": "email o null",
  "telefono": "teléfono o null",
  "domicilio_fiscal": "dirección completa con CP y municipio",
  "tipo_cliente": "autonomo | sociedad | asociacion",
  "regimen_fiscal": "estimacion_directa | modulos | general | simplificado",
  "situacion_iva": "normal | exento | no_sujeto | mixto",
  "periodicidad": "trimestral | mensual",
  "tiene_trabajadores": false,
  "tiene_alquileres": false,
  "epigrafes_iae": ["código - descripción"],
  "observaciones": "datos adicionales relevantes del documento",
  "confianza": "alta | media | baja",
  "campos_dudosos": ["campos donde no estás seguro"]
}

Criterios:
- tipo_cliente: NIF con letra inicial = sociedad (SL,SA,SLU) o asociacion (G...). NIF numérico = autonomo.
- regimen_fiscal: busca casillas de alta de actividades. Módulos/estimación objetiva = "modulos". Estimación directa = "estimacion_directa". Régimen general IS = "general".
- situacion_iva: dado de alta en IVA sin exención = "normal". Exención art.20 LIVA = "exento". No realiza actividad sujeta = "no_sujeto".
- epigrafes_iae: extrae todos los que aparezcan.
- Si un campo no está en el documento usa null, nunca inventes datos.`;

    const body={
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:[
        isPDF
          ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
          :{type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:prompt}
      ]}]
    };

    const res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Error ${res.status}`);}

    paso('ico2','ico3');
    const data=await res.json();
    const txt=data.content?.find(b=>b.type==='text')?.text||'';
    const clean=txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const extraido=JSON.parse(clean);

    paso('ico3','ico4');
    paso('ico4',null);
    ocrData=extraido;

    await new Promise(r=>setTimeout(r,500));
    mostrarResultadoOCR(extraido);

  }catch(e){
    console.error(e);
    showModal(`
      <div class="modal-title">❌ Error al procesar</div>
      <div style="color:var(--red);font-size:13px;margin-bottom:12px">${e.message}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px">Posibles causas: API key incorrecta, documento protegido o ilegible.</div>
      <button class="btn btn-secondary" onclick="abrirImportador()">🔄 Intentar de nuevo</button>
    `);
  }
}

function mostrarResultadoOCR(d){
  const cIcon={alta:'✅',media:'⚠️',baja:'🔴'}[d.confianza]||'❓';
  const cColor={alta:'var(--green)',media:'var(--yellow)',baja:'var(--orange)'}[d.confianza]||'var(--text2)';
  const dudosos=d.campos_dudosos||[];
  const isDud=label=>dudosos.some(f=>f.toLowerCase().includes(label.toLowerCase())||label.toLowerCase().includes(f.toLowerCase()));

  const filas=[
    ['Nombre',d.nombre_razon_social],
    ['NIF/CIF',d.nif_cif],
    ['Tipo',LT[d.tipo_cliente]||d.tipo_cliente],
    ['Régimen',LR[d.regimen_fiscal]||d.regimen_fiscal],
    ['IVA',LI[d.situacion_iva]||d.situacion_iva],
    ['Domicilio',d.domicilio_fiscal],
    ['Email',d.email],
    ['Teléfono',d.telefono],
    ['Periodicidad',d.periodicidad],
    ['Trabajadores',d.tiene_trabajadores?'Sí':'No'],
    ['Alquileres',d.tiene_alquileres?'Sí':'No'],
    ['IAE',d.epigrafes_iae?.join(' · ')||null],
  ].filter(([,v])=>v!=null&&v!==undefined&&v!=='');

  showModal(`
    <div class="modal-title">🔍 Datos extraídos del 036</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:18px">${cIcon}</span>
      <div>
        <div style="font-size:12px;font-weight:600;color:${cColor}">Confianza: ${(d.confianza||'').toUpperCase()}</div>
        ${dudosos.length?`<div style="font-size:11px;color:var(--text2)">Revisar: ${dudosos.join(', ')}</div>`:''}
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      ${filas.map(([label,valor])=>{
        const warn=isDud(label);
        return`<div class="ef-row">
          <span class="ef-label">${label}</span>
          <span class="ef-value" style="${warn?'color:var(--yellow)':''}">${valor}</span>
          ${warn?'<span class="ef-warn">REVISAR</span>':'<span class="ef-ok">OK</span>'}
        </div>`;
      }).join('')}
    </div>
    ${d.observaciones?`<div style="padding:10px 14px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;color:var(--text2)"><strong style="color:var(--accent)">Notas:</strong> ${d.observaciones}</div>`:''}
    <div style="padding:10px 14px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius-sm);margin-bottom:14px;font-size:11px;color:var(--yellow)">
      ⚠️ Revisa todos los campos antes de crear el cliente. Modifica lo que necesites en el formulario.
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="abrirImportador()">🔄 Otro archivo</button>
      <button class="btn btn-green" style="flex:2" onclick="abrirFormOCR()">✏️ Revisar y crear</button>
    </div>
  `);
}

function abrirFormOCR(){hideModal();mostrarForm(null,ocrData);}

function renderClientes(){
  const el=document.getElementById('s-clientes');
  if(S.loading){el.innerHTML='<div class="loading"><span class="spinner">⏳</span> Cargando...</div>';return;}
  let lista=S.clientes.filter(c=>c.activo);
  if(S.q){const q=S.q.toLowerCase();lista=lista.filter(c=>c.nombre_razon_social.toLowerCase().includes(q)||(c.nif_cif||'').toLowerCase().includes(q));}
  if(S.filtro==='urgentes')lista=lista.filter(c=>c.semaforo==='rojo');
  else if(S.filtro==='pendientes')lista=lista.filter(c=>['amarillo','naranja'].includes(c.semaforo));
  else if(S.filtro==='aldia')lista=lista.filter(c=>c.semaforo==='verde');
  else if(S.filtro==='sociedades')lista=lista.filter(c=>c.tipo_cliente==='sociedad');
  else if(S.filtro==='autonomos')lista=lista.filter(c=>c.tipo_cliente==='autonomo');

  el.innerHTML=`
    <div class="page-header"><div><div class="page-title">Clientes</div><div class="page-sub">${S.clientes.filter(c=>c.activo).length} activos</div></div></div>
    <div class="search-wrap"><div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar nombre o NIF..." value="${S.q}" oninput="S.q=this.value;renderClientes()"></div></div>
    <div class="chips">
      ${[['todos','Todos'],['urgentes','🔴 Urgentes'],['pendientes','🟡 Pendientes'],['aldia','🟢 Al día'],['sociedades','Sociedades'],['autonomos','Autónomos']]
        .map(([k,l])=>`<div class="chip ${S.filtro===k?'active':''}" onclick="S.filtro='${k}';renderClientes()">${l}</div>`).join('')}
    </div>
    <div class="semaforo-legend">
      <div class="sl-item"><div class="sl-dot" style="background:var(--green)"></div><span class="sl-label">Presentado</span></div>
      <div class="sl-item"><div class="sl-dot" style="background:var(--yellow)"></div><span class="sl-label">En plazo</span></div>
      <div class="sl-item"><div class="sl-dot" style="background:var(--orange)"></div><span class="sl-label">Sin docs</span></div>
      <div class="sl-item"><div class="sl-dot" style="background:var(--red)"></div><span class="sl-label">Urgente</span></div>
      <div class="sl-item"><div class="sl-dot" style="background:var(--blue)"></div><span class="sl-label">Exento</span></div>
    </div>
    <div class="client-list">
      ${lista.length
        ?lista.sort((a,b)=>{const ord={rojo:0,naranja:1,amarillo:2,azul:3,verde:4};return(ord[a.semaforo]??2)-(ord[b.semaforo]??2);}).map((c,i)=>{
  const borde={rojo:'border-left:3px solid var(--red)',naranja:'border-left:3px solid var(--orange)',amarillo:'border-left:3px solid var(--yellow)',verde:'border-left:3px solid var(--green)',azul:'border-left:3px solid var(--blue)'}[c.semaforo]||'';
  return`<div class="card card-p fade-up" style="animation-delay:${i*.04}s;${borde}"><div class="client-row" onclick="abrirFicha('${c.id}')">${rowHTML(c)}</div></div>`;
}).join('')

    </div>

function recoger(){
  return{
    nombre_razon_social:document.getElementById('f-nom').value.trim(),
    nif_cif:document.getElementById('f-nif').value.trim().toUpperCase(),
    tipo_cliente:document.getElementById('f-tipo').value,
    regimen_fiscal:document.getElementById('f-reg').value,
    situacion_iva:document.getElementById('f-iva').value,
    email:document.getElementById('f-email').value.trim()||null,
    telefono:document.getElementById('f-tel').value.trim()||null,
    domicilio_fiscal:document.getElementById('f-dom').value.trim()||null,
    periodicidad:document.getElementById('f-per').value,
    tiene_trabajadores:document.getElementById('t-tr').classList.contains('on'),
    tiene_alquileres:document.getElementById('t-al').classList.contains('on'),
    observaciones:document.getElementById('f-obs').value.trim()||null,
    epigrafes_iae:document.getElementById('f-iae').value.trim()?document.getElementById('f-iae').value.split(',').map(s=>s.trim()).filter(Boolean):[],
  };
}
async function ejecutarCrear(){
  const d=recoger();
  if(!d.nombre_razon_social||!d.nif_cif){toast('Nombre y NIF son obligatorios','error');return;}
  try{await guardarCliente({...d,activo:true,semaforo:'amarillo'});hideModal();toast(`✅ ${d.nombre_razon_social} creado`);await cargarDatos();}
  catch(e){toast(e.message?.includes('unique')?'Ya existe un cliente con ese NIF':'Error guardando cliente','error');}
}
async function ejecutarEdit(id){
  const d=recoger();
  if(!d.nombre_razon_social||!d.nif_cif){toast('Nombre y NIF son obligatorios','error');return;}
  try{await updateCliente(id,d);hideModal();toast('✅ Cliente actualizado');await cargarDatos();await renderFicha();}
  catch(e){toast('Error actualizando cliente','error');}
}
async function confirmarBorrar(id){
  const c=S.clientes.find(x=>x.id===id);
  showModal(`<div class="modal-title">🗑️ Eliminar cliente</div><div class="modal-sub">¿Eliminar a <strong>${c?.nombre_razon_social}</strong>? No se puede deshacer.</div><div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-secondary" style="flex:1" onclick="hideModal()">Cancelar</button><button class="btn btn-danger" style="flex:1" onclick="ejecutarBorrar('${id}')">Eliminar</button></div>`);
}
async function ejecutarBorrar(id){
  try{await deleteCliente(id);hideModal();toast('Cliente eliminado');await cargarDatos();goTo('clientes');}
  catch(e){toast('Error eliminando','error');}
}

function mostrarRecordatorio(id){
  const c=S.clientes.find(x=>x.id===id)||S.clienteActual;
  const msgDefecto=`Estimado/a ${c?.nombre_razon_social}, le recordamos que necesitamos la documentación del 1T 2026 para poder presentar sus modelos fiscales en plazo. La domiciliación bancaria vence el 15 de abril y la presentación general el 20 de abril. Muchas gracias.`;
  showModal(`
    <div class="modal-title">📩 Recordatorio</div>
    <div class="modal-sub">${c?.nombre_razon_social}</div>
    <div class="form-group"><label class="form-label">Canal</label>
      <select class="form-select" id="r-can" onchange="actualizarBtnRecordatorio()">
        <option value="email">📧 Email</option>
        <option value="whatsapp">💬 WhatsApp</option>
        <option value="sms">📱 SMS</option>
        <option value="plataforma">🔗 Plataforma</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Mensaje</label>
      <textarea class="form-textarea" id="r-msg" style="height:100px">${msgDefecto}</textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="hideModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" id="btn-enviar-rec" onclick="enviarRec('${id}')">📩 Registrar</button>
    </div>
  `);
}
function actualizarBtnRecordatorio(){
  const canal=document.getElementById('r-can')?.value;
  const btn=document.getElementById('btn-enviar-rec');
  if(!btn)return;
  if(canal==='whatsapp'){btn.textContent='💬 Abrir WhatsApp';btn.onclick=()=>abrirWhatsApp();}
  else{btn.textContent='📩 Registrar';btn.onclick=()=>enviarRec(document.getElementById('r-can').dataset.id);}
}
function abrirWhatsApp(){
  const msg=document.getElementById('r-msg')?.value||'';
  const tel=S.clienteActual?.telefono||'';
  const telLimpio=tel.replace(/\s+/g,'').replace(/^\+/,'').replace(/^0034/,'34').replace(/^34/,'34');
  const url=telLimpio
    ?`https://wa.me/${telLimpio}?text=${encodeURIComponent(msg)}`
    :`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}
async function enviarRec(id){
  const realId = id || S.clienteActual?.id;
  if(!realId){toast('Error: cliente no identificado','error');return;}
  try{
    await sb.from('recordatorios').insert([{
      cliente_id:realId,
      tipo:'documentacion',
      canal:document.getElementById('r-can').value,
      estado:'enviado',
      mensaje:document.getElementById('r-msg').value.trim()
    }]);
    hideModal();
    toast('✅ Recordatorio registrado');
    if(S.screen==='ficha')await renderFicha();
  }catch(e){toast('Error registrando recordatorio','error');}
}

async function cambiarEst(cid,mid,est){

    await renderFicha();
  }catch(e){
    console.error(e);
    toast('Error guardando estado','error');
  }
}

async function renderCampana() {
  const el = document.getElementById('s-campana');
  if (!el) return;
  el.innerHTML = '<div class="loading"><span class="spinner">⏳</span> Cargando campaña...</div>';

  const camp = S.campana;
  if (!camp) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Sin campaña activa</div></div>';
    return;
  }

  // Load all presentations and obligations for active campaign
  const clientesActivos = S.clientes.filter(c => c.activo);
  const { data: todasPres } = await sb.from('presentaciones')
    .select('*, modelos_fiscales(*)')
    .eq('campana_id', camp.id);
  const { data: todasObs } = await sb.from('obligaciones_cliente')
    .select('*, modelos_fiscales(*)')
    .in('cliente_id', clientesActivos.map(c => c.id));

  const pres = todasPres || [];
  const obs = todasObs || [];

  const ANUALES = ['390','190','180','347','200'];
  const diasRestantes = Math.ceil((new Date('2026-04-20') - new Date()) / 86400000);

  // Stats
  let totalModelos = 0, presentados = 0, pendientes = 0, sinDocs = 0;
  const clientesData = clientesActivos.map(c => {
    const obsCli = obs.filter(o => o.cliente_id === c.id && o.activo && o.origen !== 'excluido_manual');
    const obsPeriodo = obsCli.filter(o => !ANUALES.includes(o.modelos_fiscales?.codigo || ''));
    const presCli = pres.filter(p => p.cliente_id === c.id);

    const modelos = obsPeriodo.map(o => {
      const p = presCli.find(p => p.modelo_id === o.modelo_id);
      const estado = p?.estado || 'pendiente';
      const resultado = p?.resultado || '';
      return { ...o, estado, resultado, docs: p?.docs_completos || false };
    });

    totalModelos += modelos.length;
    const presCount = modelos.filter(m => m.estado === 'presentado' || m.estado === 'exento').length;
    const pendCount = modelos.filter(m => m.estado === 'pendiente').length;
    presentados += presCount;
    pendientes += pendCount;

    const semaforo = calcularSemaforo(obsCli, presCli);
    return { ...c, semaforo, modelos, presCount, pendCount, total: modelos.length };
  });

  // Sort by urgency
  clientesData.sort((a,b) => {
    const ord = {rojo:0, naranja:1, amarillo:2, azul:3, verde:4};
    return (ord[a.semaforo]??2) - (ord[b.semaforo]??2);
  });

  const pct = totalModelos > 0 ? Math.round((presentados / totalModelos) * 100) : 0;
  const colorDias = diasRestantes <= 3 ? 'var(--red)' : diasRestantes <= 7 ? 'var(--orange)' : 'var(--yellow)';

  const RESULTADO_LABELS = {
    a_pagar: '💰 A pagar',
    a_compensar: '↔️ Compensar',
    a_devolver: '🔄 Devolver',
    resultado_cero: '⚖️ Cero',
    sin_actividad: '— Sin act.'
  };

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Campaña</div>
        <div class="page-sub">${camp.nombre} · Vence 20 abril</div>
      </div>
      <div style="font-size:12px;font-weight:700;color:${colorDias};background:rgba(0,0,0,.2);padding:6px 12px;border-radius:20px;border:1px solid ${colorDias}">${diasRestantes}d</div>
    </div>

    <!-- Resumen -->
    <div style="margin:0 20px 16px;background:linear-gradient(135deg,#1a2540,#1e1a35);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--green)">${presentados}</div>
          <div style="font-size:10px;color:var(--text2)">Presentados</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--yellow)">${pendientes}</div>
          <div style="font-size:10px;color:var(--text2)">Pendientes</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--accent)">${clientesActivos.length}</div>
          <div style="font-size:10px;color:var(--text2)">Clientes</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:700">${pct}%</div>
          <div style="font-size:10px;color:var(--text2)">Completado</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,.07);border-radius:6px;height:8px">
        <div style="height:8px;border-radius:6px;background:linear-gradient(90deg,var(--accent2),var(--accent));width:${pct}%;transition:width .8s"></div>

function toggleCampanaCliente(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function filtrarCampana(tipo) {
  document.querySelectorAll('.chips .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-'+tipo)?.classList.add('active');
  document.querySelectorAll('#campana-lista .card').forEach(card => {
    const sem = card.dataset.semaforo;
    if (tipo === 'todos') card.style.display = '';
    else if (tipo === 'urgentes') card.style.display = (sem === 'rojo') ? '' : 'none';
    else if (tipo === 'pendientes') card.style.display = (['amarillo','naranja'].includes(sem)) ? '' : 'none';
    else if (tipo === 'ok') card.style.display = (sem === 'verde') ? '' : 'none';
  });
}

async function cambiarEstCampana(cid, mid, estado) {
  try {
    await setEstado(cid, mid, estado);
    const lbl={presentado:'✅ Presentado',exento:'🔵 Exento',en_preparacion:'⚙️ En prep.',revisado:'👁 Revisado',pendiente:'Pendiente'}[estado]||'Estado actualizado';
    toast(lbl);
    await renderCampana();
  } catch(e) {
    console.error(e);
    toast('Error guardando estado','error');
  }
}

// ── DATA: Renta ───────────────────────────────────────────────
async function cargarParticulares() {
  // Cargar todos los clientes que tienen ficha en particulares_renta
  // (incluye tipo particular_renta Y autónomos/sociedades vinculados via botón Renta)
  const { data: fichasRenta } = await sb.from('particulares_renta').select('cliente_id');
  if (!fichasRenta || fichasRenta.length === 0) return [];
  const ids = fichasRenta.map(f => f.cliente_id);
  const { data } = await sb.from('clientes')
    .select('*')
    .in('id', ids)
    .eq('activo', true)
    .order('nombre_razon_social');
  return data || [];
}

async function cargarCampanasRenta(clienteId) {
  const { data } = await sb.from('campanas_renta')
    .select('*')
    .eq('cliente_id', clienteId)
    .order('ejercicio', { ascending: false });
  return data || [];
}

async function cargarParticular(clienteId) {
  const { data } = await sb.from('particulares_renta')
    .select('*')
    .eq('cliente_id', clienteId)
    .maybeSingle();
  return data;
}

async function guardarParticular(clienteId, datos) {
  const existing = await cargarParticular(clienteId);
  if (existing) {
    await sb.from('particulares_renta').update(datos).eq('cliente_id', clienteId);
  } else {
    await sb.from('particulares_renta').insert([{ cliente_id: clienteId, ...datos }]);
  }
}

async function cargarCampanaRenta(clienteId, ejercicio) {
  const { data } = await sb.from('campanas_renta')
    .select('*')
    .eq('cliente_id', clienteId)
    .eq('ejercicio', ejercicio)
    .maybeSingle();
  return data;
}

async function guardarCampanaRenta(clienteId, ejercicio, datos) {
  try {
    const existing = await cargarCampanaRenta(clienteId, ejercicio);
    if (existing) {
      const { error } = await sb.from('campanas_renta').update(datos).eq('id', existing.id);
      if (error) throw error;
    } else {
      const { error } = await sb.from('campanas_renta').insert([{
        cliente_id: clienteId,
        ejercicio,
        estado: 'pendiente_documentos',
        estado_semaforo: 'rojo',
        ...datos
      }]);
      if (error) throw error;
    }
  } catch(e) {
    console.error('guardarCampanaRenta error:', e);
    throw e;
  }
}

function calcularSemaforoRenta(campana) {
  if (!campana) return 'rojo';
  if (campana.estado === 'presentada' || campana.estado === 'archivada') return 'verde';
  if (campana.estado === 'lista_para_presentar' || campana.estado === 'en_preparacion') return 'ambar';
  if (campana.cuestionario_completado && campana.documentos_aportados) return 'ambar';
  return 'rojo';
}

// ── RENDER: Lista Renta ───────────────────────────────────────
async function renderRenta() {
  const el = document.getElementById('s-renta');
  if (!el) return;
  el.innerHTML = '<div class="loading"><span class="spinner">⏳</span> Cargando...</div>';

  const particulares = await cargarParticulares();

  // Load latest campana for each particular
  const conCampana = await Promise.all(particulares.map(async p => {
    const campanas = await cargarCampanasRenta(p.id);
    const campanaActual = campanas.find(c => c.ejercicio === S.rentaEjercicio) || campanas[0] || null;
    return { ...p, campanaActual };

  // Sort: rojo first, verde last
  conCampana.sort((a, b) => {

const PROMPTS_ANALISIS = {
  datos_fiscales: `Eres asesor fiscal español experto. Analiza estos datos fiscales de la AEAT y extrae TODOS los datos disponibles. Devuelve ÚNICAMENTE un JSON válido sin markdown con esta estructura: {"tipo_doc":"datos_fiscales","ccaa":"comunidad autónoma completa","nif":"NIF","nombre":"nombre completo","ejercicio":2024,"rendimientos_trabajo":{"total_ingresos":0,"total_retenciones":0,"num_pagadores":1,"segundo_pagador_importe":0,"pensiones":false,"desempleo":false},"actividad_economica":{"es_autonomo":false,"ingresos":0,"retenciones":0,"cuota_ss":0},"rendimientos_capital":{"dividendos":0,"intereses":0,"alquileres_cobrados":0},"ganancias_perdidas":{"venta_acciones":false,"venta_inmueble":false,"importe_total":0},"deducciones_detectadas":{"plan_pensiones":0,"donativos":0,"hipoteca_pre2013":false,"alquiler_vivienda":false},"resultado":"a_devolver o a_ingresar o pendiente","importe_resultado":0,"observaciones":"datos adicionales"}`,

  renta_anterior: `Eres asesor fiscal español experto. Analiza esta declaración de renta del año anterior. Devuelve ÚNICAMENTE un JSON válido sin markdown: {"tipo_doc":"renta_anterior","ejercicio":2023,"modalidad":"individual o conjunta","resultado":"a_devolver o a_ingresar","importe_resultado":0,"deducciones_aplicadas":["lista"],"observaciones":"datos útiles"}`,

  modelo_fiscal: `Eres asesor fiscal español experto. Analiza este modelo fiscal de la AEAT (303,130,131,190,180,390 u otro). Devuelve ÚNICAMENTE un JSON válido sin markdown: {"tipo_doc":"modelo_fiscal","modelo":"número","ejercicio":2024,"periodo":"1T,2T,3T,4T o anual","nif":"NIF","nombre":"nombre","datos_clave":{"base_imponible":0,"cuota":0,"retenciones":0,"resultado":0,"ingresos_actividad":0,"gastos_actividad":0,"cuota_ss_autonomo":0},"resumen":"qué aporta para la renta"}`,

  otro: `Eres asesor fiscal español experto. Analiza este documento y extrae datos para la declaración de renta. Devuelve ÚNICAMENTE un JSON válido sin markdown: {"tipo_doc":"otro","tipo_identificado":"hipoteca/donativo/guarderia/discapacidad/herencia/divorcio/familia_numerosa/otro","datos_extraidos":{"descripcion":"qué contiene","importe":0,"fecha":null,"entidad":null,"deduccion_aplicable":"descripción"},"observaciones":"datos adicionales"}`
};

function mapearDatosAPreguntas(d, preguntasMap) {
  const result = [];
  const add = (codigo, tipo, valor) => {
    const p = preguntasMap[codigo];
    if (!p || valor === null || valor === undefined) return;
    result.push({ pregunta_id: p.id, codigo, tipo, valor });
  };
  if (d.tipo_doc === 'datos_fiscales' || d.tipo_doc === 'modelo_fiscal') {
    if (d.actividad_economica && d.actividad_economica.es_autonomo) add('es_autonomo','bool',true);
    if (d.actividad_economica && d.actividad_economica.ingresos > 0) add('ingresos_autonomo','importe',d.actividad_economica.ingresos);
    if (d.actividad_economica && d.actividad_economica.cuota_ss > 0) add('cuota_autonomos','importe',d.actividad_economica.cuota_ss);
    if (d.datos_clave && d.datos_clave.ingresos_actividad > 0) add('ingresos_autonomo','importe',d.datos_clave.ingresos_actividad);
    if (d.datos_clave && d.datos_clave.gastos_actividad > 0) add('gastos_autonomo','importe',d.datos_clave.gastos_actividad);
    if (d.datos_clave && d.datos_clave.cuota_ss_autonomo > 0) add('cuota_autonomos','importe',d.datos_clave.cuota_ss_autonomo);
    if (d.rendimientos_trabajo && d.rendimientos_trabajo.num_pagadores > 1) add('dos_pagadores','bool',true);
    if (d.rendimientos_trabajo && d.rendimientos_trabajo.segundo_pagador_importe > 0) add('importe_segundo_pagador','importe',d.rendimientos_trabajo.segundo_pagador_importe);
    if (d.rendimientos_trabajo && d.rendimientos_trabajo.pensiones) add('pensiones','bool',true);
    if (d.rendimientos_trabajo && d.rendimientos_trabajo.desempleo) add('desempleo','bool',true);
    if (d.ganancias_perdidas && d.ganancias_perdidas.venta_acciones) add('venta_activos','bool',true);
    if (d.ganancias_perdidas && d.ganancias_perdidas.venta_inmueble) add('venta_inmueble','bool',true);
    if (d.rendimientos_capital && d.rendimientos_capital.alquileres_cobrados > 0) add('ingresos_alquiler','bool',true);
    if (d.deducciones_detectadas && d.deducciones_detectadas.plan_pensiones > 0) { add('tiene_plan_pensiones','bool',true); add('aportacion_plan_pensiones','importe',d.deducciones_detectadas.plan_pensiones); }
    if (d.deducciones_detectadas && d.deducciones_detectadas.donativos > 0) { add('donativos','bool',true); add('importe_donacion','importe',d.deducciones_detectadas.donativos); }
    if (d.deducciones_detectadas && d.deducciones_detectadas.hipoteca_pre2013) add('hipoteca_pre2013','bool',true);
    if (d.deducciones_detectadas && d.deducciones_detectadas.alquiler_vivienda) add('vive_alquiler','bool',true);
  }
  if (d.tipo_doc === 'otro') {
    const t = d.tipo_identificado;
    if (t === 'hipoteca') add('hipoteca_pre2013','bool',true);
    if (t === 'guarderia') add('guardia_hijos','bool',true);
    if (t === 'discapacidad') add('discapacidad','bool',true);
    if (t === 'donativo') add('donativos','bool',true);
    if (t === 'divorcio') add('custodia_compartida','bool',true);
    if (t === 'familia_numerosa') add('familia_numerosa','bool',true);
    if (d.datos_extraidos && d.datos_extraidos.importe > 0) {
      if (t === 'donativo') add('importe_donacion','importe',d.datos_extraidos.importe);
      if (t === 'hipoteca') add('importe_hipoteca','importe',d.datos_extraidos.importe);
    }
  }
  return result;
}

async function subirYAnalizarRenta(clienteId, ejercicio, flagCampo, tipoAnalisis) {
  const apiKey = getKey();
  if (!apiKey) { toast('Configura tu API key en Config', 'error'); return; }

  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.pdf,image/*'; input.style.display = 'none';
  document.body.appendChild(input);

  input.onchange = async (e) => {
    const file = e.target.files[0];
    document.body.removeChild(input);
    if (!file) return;

    const cObj = S.clientes.find(x => x.id === clienteId) || S.rentaCliente;
    const nomTipo = {datos_fiscales:'Datos fiscales AEAT',renta_anterior:'Renta anterior',modelo_fiscal:'Modelo fiscal',otro:'Documento'}[tipoAnalisis]||'Documento';

    showModal('<div class="modal-title">&#9203; Analizando ' + nomTipo + '</div><div class="modal-sub">' + (cObj ? cObj.nombre_razon_social : '') + ' &middot; Ejercicio ' + ejercicio + '</div><div style="margin-top:12px"><div class="ocr-step"><div class="step-icon active" id="rp1">&#128194;</div><div><div style="font-size:13px;font-weight:500">Leyendo archivo</div><div style="font-size:11px;color:var(--text2)">' + file.name + '</div></div></div><div class="ocr-step"><div class="step-icon pending" id="rp2">&#128269;</div><div><div style="font-size:13px;font-weight:500">Claude analiza el documento</div><div style="font-size:11px;color:var(--text2)">Extrayendo datos fiscales...</div></div></div><div class="ocr-step"><div class="step-icon pending" id="rp3">&#129137;</div><div><div style="font-size:13px;font-weight:500">Pre-rellenando cuestionario</div><div style="font-size:11px;color:var(--text2)">Guardando respuestas...</div></div></div><div class="ocr-step"><div class="step-icon pending" id="rp4">&#9989;</div><div><div style="font-size:13px;font-weight:500">Listo</div></div></div></div>');

    try {
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
      const mime = isPDF ? 'application/pdf' : (file.type || 'image/jpeg');
      pasoAnalisisRenta('rp1','rp2');

      const prompt = PROMPTS_ANALISIS[tipoAnalisis] || PROMPTS_ANALISIS.otro;
      const bodyReq = {
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: [
          isPDF ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64 } }
                : { type:'image', source:{ type:'base64', media_type:mime, data:b64 } },
          { type:'text', text:prompt }
        ]}]
      };

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify(bodyReq)
      });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error && err.error.message ? err.error.message : 'Error ' + res.status); }

      const data = await res.json();
      const txt = data.content && data.content.find(function(b){ return b.type==='text'; }) ? data.content.find(function(b){ return b.type==='text'; }).text : '';
      const clean = txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      const extraido = JSON.parse(clean);
      pasoAnalisisRenta('rp2','rp3');

      let preguntas = preguntasActuales;
      if (!preguntas || preguntas.length === 0) {
        const pResp = await sb.from('preguntas_cuestionario_renta').select('*').eq('activo', true);
        preguntas = pResp.data || PREGUNTAS_RENTA_BASE;
      }
      const preguntasMap = {};
      preguntas.forEach(function(p){ preguntasMap[p.codigo] = p; });

      const respuestasAGuardar = mapearDatosAPreguntas(extraido, preguntasMap);
      let guardadas = 0;

      for (let i = 0; i < respuestasAGuardar.length; i++) {
        const r = respuestasAGuardar[i];
        try {
          const payload = { cliente_id:clienteId, ejercicio:ejercicio, pregunta_id:r.pregunta_id, estado:'respondida' };
          if (r.tipo === 'bool')    payload.respuesta_bool    = r.valor;
          if (r.tipo === 'importe') payload.respuesta_importe = r.valor;
          if (r.tipo === 'texto')   payload.respuesta_texto   = r.valor;
          const exResp = await sb.from('respuestas_cuestionario_renta').select('id').eq('cliente_id',clienteId).eq('ejercicio',ejercicio).eq('pregunta_id',r.pregunta_id).maybeSingle();
          if (exResp.data) await sb.from('respuestas_cuestionario_renta').update(payload).eq('id', exResp.data.id);
          else await sb.from('respuestas_cuestionario_renta').insert([payload]);
          guardadas++;
        } catch(err) { console.warn('Error guardando', r.codigo, err); }
      }

      const actualizaciones = { documentos_aportados: true };
      if (flagCampo) actualizaciones[flagCampo] = true;
      if (extraido.ccaa) {
        await sb.from('particulares_renta').update({ ccaa_residencia: extraido.ccaa }).eq('cliente_id', clienteId);
      }
      await guardarCampanaRenta(clienteId, ejercicio, actualizaciones);
      pasoAnalisisRenta('rp3','rp4');
      pasoAnalisisRenta('rp4', null);
      await new Promise(function(resolve){ setTimeout(resolve, 400); });

      const docsNecesarios = DOCS_REQUERIDOS.filter(function(d){
        return respuestasAGuardar.some(function(r){ return r.codigo === d.pregunta && r.valor === true; });
      });

      let camposHtml = guardadas > 0
        ? respuestasAGuardar.slice(0,8).map(function(r){ return '<div style="font-size:11px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border)">&#10003; ' + r.codigo.replace(/_/g,' ') + ': <strong style="color:var(--text)">' + r.valor + '</strong></div>'; }).join('')
          + (respuestasAGuardar.length > 8 ? '<div style="font-size:11px;color:var(--accent);margin-top:4px">+ ' + (respuestasAGuardar.length-8) + ' campos más</div>' : '')
        : '<div style="font-size:12px;color:var(--text2)">No se detectaron datos auto-rellenables.</div>';

      let docsHtml = docsNecesarios.length > 0
        ? '<div style="padding:10px 12px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius-sm);margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--yellow);margin-bottom:6px">&#128203; Documentos a aportar:</div>' + docsNecesarios.map(function(d){ return '<div style="font-size:11px;color:var(--text2);padding:2px 0">&middot; ' + d.doc + '</div>'; }).join('') + '</div>'
        : '';

      let ccaaHtml = extraido.ccaa
        ? '<div style="padding:10px 12px;background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:var(--radius-sm);margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--accent)">&#128205; CCAA: ' + extraido.ccaa + '</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Deducciones autonómicas aplicadas</div></div>'
        : '';

      showModal('<div class="modal-title">&#9989; Análisis completado</div><div class="modal-sub">' + nomTipo + '</div>' + ccaaHtml + '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px"><div style="font-size:12px;font-weight:600;margin-bottom:8px">Campos pre-rellenados (' + guardadas + '):</div>' + camposHtml + '</div>' + docsHtml + '<div style="display:flex;gap:8px"><button class="btn btn-secondary" style="flex:1" onclick="hideModal();renderRentaFicha()">&#8592; Volver</button><button class="btn btn-primary" style="flex:2" onclick="hideModal();abrirCuestionario(\'' + clienteId + '\',' + ejercicio + ')">&#129302; ' + (guardadas > 0 ? 'Completar cuestionario' : 'Lanzar cuestionario') + '</button></div>');

      const rData = await sb.from('respuestas_cuestionario_renta').select('*').eq('cliente_id',clienteId).eq('ejercicio',ejercicio);
      respuestasActuales = {};
      if (rData.data) rData.data.forEach(function(r){ respuestasActuales[r.pregunta_id] = r; });

    } catch(e) {
      console.error('Error análisis:', e);
      showModal('<div class="modal-title">&#10060; Error al analizar</div><div style="color:var(--red);font-size:13px;margin-bottom:12px">' + e.message + '</div><button class="btn btn-secondary" onclick="hideModal()">Cerrar</button>');
    }
  };
  input.click();
}

function pasoAnalisisRenta(doneId, nextId) {
  const done = document.getElementById(doneId);
  if (done) { done.className = 'step-icon done'; done.textContent = '✓'; }
  if (nextId) { const next = document.getElementById(nextId); if (next) next.className = 'step-icon active'; }
}

function recogerFormParticular() {
  return {
    cliente: {
      nombre_razon_social: document.getElementById('rp-nombre').value.trim(),
      nif_cif: document.getElementById('rp-nif').value.trim().toUpperCase(),
      telefono: document.getElementById('rp-tel').value.trim() || null,
      email: document.getElementById('rp-email').value.trim() || null,
      tipo_cliente: 'particular_renta',
      activo: true,
      semaforo: 'amarillo',
    },
    particular: {
      ccaa_residencia: document.getElementById('rp-ccaa').value || null,
      estado_civil: document.getElementById('rp-civil').value || null,
      modalidad_habitual: document.getElementById('rp-modalidad').value || 'pendiente',
      tiene_conyuge: document.getElementById('rp-conyuge').classList.contains('on'),
      tiene_hijos: document.getElementById('rp-hijos').classList.contains('on'),
      tiene_ascendientes: document.getElementById('rp-ascend').classList.contains('on'),
      tiene_discapacidad: document.getElementById('rp-discap').classList.contains('on'),
      observaciones: document.getElementById('rp-obs').value.trim() || null,
    }
  };
}

async function crearNuevoParticular() {
  const { cliente, particular } = recogerFormParticular();
  if (!cliente.nombre_razon_social || !cliente.nif_cif) {
    toast('Nombre y NIF son obligatorios', 'error'); return;
  }
  try {
    const { data, error } = await sb.from('clientes').insert([cliente]).select().single();
    if (error) throw error;
    await guardarParticular(data.id, particular);
    // Add to local state
    S.clientes.push(data);
    hideModal();
    toast(`✅ ${cliente.nombre_razon_social} creado`);
    await renderRenta();
  } catch(e) {
    toast(e.message?.includes('unique') ? 'Ya existe un cliente con ese NIF' : 'Error creando particular', 'error');
  }
}

async function guardarEdicionParticular(clienteId) {
  const { cliente, particular } = recogerFormParticular();
  if (!cliente.nombre_razon_social || !cliente.nif_cif) {
    toast('Nombre y NIF son obligatorios', 'error'); return;
  }
  try {
    await sb.from('clientes').update({
      nombre_razon_social: cliente.nombre_razon_social,
      nif_cif: cliente.nif_cif,
      telefono: cliente.telefono,
      email: cliente.email,
    }).eq('id', clienteId);
    await guardarParticular(clienteId, particular);
    hideModal();
    toast('✅ Ficha actualizada');
    // Reload
    const { data } = await sb.from('clientes').select('*').eq('id', clienteId).single();
    S.rentaCliente = data;
    await renderRentaFicha();
  } catch(e) { toast('Error guardando', 'error'); }
}

async function abrirRentaDesdeCliente(clienteId) {
  const c = S.clientes.find(x => x.id === clienteId);
  if (!c) { toast('Cliente no encontrado', 'error'); return; }

  // Verificar si ya tiene ficha en particulares_renta
  const { data: existing } = await sb.from('particulares_renta')
    .select('id').eq('cliente_id', clienteId).maybeSingle();

  // Si no existe, crear automáticamente copiando datos del cliente
  if (!existing) {
    try {
      await sb.from('particulares_renta').insert([{
        cliente_id:   clienteId,
        modalidad_habitual: 'pendiente',
        tiene_conyuge: false,
        tiene_hijos: false,
        tiene_ascendientes: false,
        tiene_discapacidad: false,
      }]);
      toast('📝 Ficha de renta creada');
    } catch(e) {
      toast('Error creando ficha renta', 'error');
      return;
    }
  }

  // Abrir módulo renta con este cliente
  S.rentaCliente = c;
  S.rentaEjercicio = 2025;
  goTo('renta-ficha');
}

// ── FUNCIÓN: obtener documentos pendientes para un cliente ───
function obtenerDocsPendientes(respuestasMap, preguntasMap) {
  const pendientes = [];
  DOCS_REQUERIDOS.forEach(({ pregunta, condicion, doc }) => {
    const pregObj = preguntasMap[pregunta];
    if (!pregObj) return;
    const resp = respuestasMap[pregObj.id];
    if (!resp) return;
    if (resp.respuesta_bool === condicion) {
      pendientes.push(doc);
    }
  });
  return pendientes;
}

// ── FUNCIÓN: preguntasVisibles con árbol completo ─────────────
function preguntasVisibles() {
  // Construir mapa codigo → respuesta
  const respPorCodigo = {};
  preguntasActuales.forEach(p => {
    const r = respuestasActuales[p.id];
    if (r) respPorCodigo[p.codigo] = r;
  });

  // Construir set de codigos a ocultar
  const ocultar = new Set();
  CONDICIONES_RENTA.forEach(({ padre, condicion, mostrar }) => {
    const respPadre = respPorCodigo[padre];
    if (!respPadre) {
      // Padre sin responder → ocultar hijos hasta que conteste
      mostrar.forEach(c => ocultar.add(c));
      return;
    }
    const valorPadre = respPadre.respuesta_bool;
    if (valorPadre !== condicion) {
      // Condición no cumplida → ocultar hijos
      mostrar.forEach(c => ocultar.add(c));
    }
  });

  return preguntasActuales.filter(p => !ocultar.has(p.codigo));
}

// ── FUNCIÓN: bloques visibles con sus preguntas ───────────────
function bloquesConPreguntas() {
  const visibles = preguntasVisibles();
  const resultado = [];
  BLOQUES_RENTA.forEach(bloque => {
    const pregs = visibles.filter(p => p.bloque === bloque.id);
    if (pregs.length > 0) {
      resultado.push({ ...bloque, preguntas: pregs });
    }
  });
  return resultado;
}

// Avanza o retrocede en el cuestionario
function cuestionarioPaso(delta) {
  const visibles = preguntasVisibles();
  cuestionarioPasoActual = Math.max(0, Math.min(visibles.length - 1, cuestionarioPasoActual + delta));
  renderCuestionario();
}

function renderPregunta(p) {
  const resp      = respuestasActuales[p.id];
  const contestada = !!resp;

  let inputHtml = '';

  if (p.tipo_respuesta === 'si_no') {
    const esSi = resp?.respuesta_bool === true;
    const esNo = resp?.respuesta_bool === false;
    // Al responder Sí/No se re-renderiza para aplicar saltos
    inputHtml = `
      <div class="btn-sino">
        <button class="${esSi ? 'selected-si' : ''}"
          onclick="guardarRespuestaBoolDinamico('${p.id}',true)">✓ Sí</button>
        <button class="${esNo ? 'selected-no' : ''}"
          onclick="guardarRespuestaBoolDinamico('${p.id}',false)">✗ No</button>
      </div>`;

  } else if (p.tipo_respuesta === 'importe') {
    inputHtml = `
      <input type="number" step="0.01" placeholder="Importe en €"
        value="${resp?.respuesta_importe || ''}"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px"
        onblur="guardarRespuestaTexto('${p.id}','importe',this.value)">`;

  } else if (p.tipo_respuesta === 'fecha') {
    inputHtml = `
      <input type="date"
        value="${resp?.respuesta_fecha || ''}"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px"
        onchange="guardarRespuestaTexto('${p.id}','fecha',this.value)">`;

  } else if (p.tipo_respuesta === 'texto') {
    inputHtml = `
      <textarea placeholder="Escribe aquí..."
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;resize:none;height:72px"
        onblur="guardarRespuestaTexto('${p.id}','texto',this.value)">${resp?.respuesta_texto || ''}</textarea>`;

  } else if (p.tipo_respuesta === 'seleccion') {
    const opciones = JSON.parse(p.opciones || '[]');
    inputHtml = `
      <div style="display:flex;flex-direction:column;gap:6px">
        ${opciones.map(op => `
          <button style="padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:${resp?.respuesta_texto===op?'var(--accent)':'var(--surface2)'};color:${resp?.respuesta_texto===op?'#fff':'var(--text)'};font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s"
            onclick="guardarRespuestaTexto('${p.id}','seleccion','${op}')">${op}</button>
        `).join('')}
      </div>`;
  }

  return `
    <div class="cuest-pregunta" id="preg-${p.id}"
      style="${contestada ? 'border-color:rgba(34,197,94,.3)' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="cuest-texto" style="flex:1;margin-bottom:0">${p.pregunta}</div>
        ${contestada ? '<span style="font-size:16px;margin-left:8px;flex-shrink:0">✅</span>' : ''}
      </div>
      ${inputHtml}
    </div>`;
}

// Wrapper para si_no que re-renderiza el cuestionario tras guardar
// (necesario para aplicar saltos condicionales en tiempo real)
async function guardarRespuestaBoolDinamico(preguntaId, valor) {
  await guardarRespuestaBool(preguntaId, valor);     // llama al original sin cambios
  // Si la pregunta tiene saltos asociados, avanzar automáticamente
  const p = preguntasActuales.find(x => x.id === preguntaId);
  const tieneSaltos = p && CONDICIONES_RENTA.some(r => r.padre === p.codigo);
  if (tieneSaltos) {
    // Recalcular visibles y avanzar si la siguiente fue saltada
    const antes = preguntasVisibles().length;
    respuestasActuales[preguntaId] = { respuesta_bool: valor }; // optimistic
    const despues = preguntasVisibles().length;
    if (antes !== despues) await renderCuestionario();
  }
}
// PASO 1 END

async function guardarRespuestaBool(preguntaId, valor) {
  const cid = cuestionarioClienteId;
  const ej = cuestionarioEjercicio;
  try {
    const existing = respuestasActuales[preguntaId];
    const payload = { cliente_id: cid, ejercicio: ej, pregunta_id: preguntaId, respuesta_bool: valor, estado: 'respondida' };
    if (existing) {
      await sb.from('respuestas_cuestionario_renta').update({ respuesta_bool: valor }).eq('id', existing.id);
      respuestasActuales[preguntaId] = { ...existing, respuesta_bool: valor };
    } else {
      const { data } = await sb.from('respuestas_cuestionario_renta').insert([payload]).select().single();
      respuestasActuales[preguntaId] = data;
    }
    // Update UI for this question
    const el = document.getElementById(`preg-${preguntaId}`);
    if (el) {
      el.style.borderColor = 'rgba(34,197,94,.3)';
      const btns = el.querySelectorAll('.btn-sino button');
      btns.forEach((btn, i) => {
        btn.className = '';
        if (i === 0 && valor === true) btn.className = 'selected-si';
        if (i === 1 && valor === false) btn.className = 'selected-no';
      });
      // Update checkmark
      const titleRow = el.querySelector('div');
      if (titleRow && !el.querySelector('span')) {
        titleRow.insertAdjacentHTML('beforeend', '<span style="font-size:16px;margin-left:8px;flex-shrink:0">✅</span>');
      }
    }
    // Update progress
    updateProgreso();
  } catch(e) { console.error(e); toast('Error guardando respuesta','error'); }
}

async function guardarRespuestaTexto(preguntaId, tipo, valor) {
  if (!valor) return;
  const cid = cuestionarioClienteId;
  const ej = cuestionarioEjercicio;
  try {
    const campo = tipo === 'importe' ? 'respuesta_importe' :
                  tipo === 'fecha' ? 'respuesta_fecha' : 'respuesta_texto';
    const payload = { cliente_id: cid, ejercicio: ej, pregunta_id: preguntaId, [campo]: valor, estado: 'respondida' };
    const existing = respuestasActuales[preguntaId];
    if (existing) {
      await sb.from('respuestas_cuestionario_renta').update({ [campo]: valor }).eq('id', existing.id);
      respuestasActuales[preguntaId] = { ...existing, [campo]: valor };
    } else {
      const { data } = await sb.from('respuestas_cuestionario_renta').insert([payload]).select().single();
      respuestasActuales[preguntaId] = data;
    }
    const el = document.getElementById(`preg-${preguntaId}`);
    if (el) el.style.borderColor = 'rgba(34,197,94,.3)';
    updateProgreso();
  } catch(e) { console.error(e); }
}

function updateProgreso() {
  const contestadas = Object.keys(respuestasActuales).length;
  const total = preguntasActuales.length;
  const pct = total > 0 ? Math.round(contestadas / total * 100) : 0;
  const bar = document.querySelector('#s-renta-cuestionario .stat-card, #s-renta-cuestionario [style*="border-radius:6px;height:6px"] + div');
  // Update progress bar width
  const fill = document.querySelector('#s-renta-cuestionario [style*="linear-gradient(90deg"]');
  if (fill) fill.style.width = pct + '%';
  // Update counter
  const counter = document.querySelector('#s-renta-cuestionario [style*="color:var(--accent)"]');
  if (counter) counter.textContent = `${contestadas}/${total} preguntas`;
}

async function finalizarCuestionario(clienteId, ejercicio) {
  try {
    await guardarCampanaRenta(clienteId, ejercicio, { cuestionario_completado: true });
    toast('✅ Cuestionario guardado');
    S.rentaCliente = S.clientes.find(c => c.id === clienteId);
    goTo('renta-ficha');
  } catch(e) { toast('Error','error'); }
}

// ── RENDER PRINCIPAL ──────────────────────
function render(){
  switch(S.screen){
    case'dashboard':renderDashboard();break;
    case'clientes':renderClientes();break;
    case'ficha':renderFicha();break;
    case'campana':renderCampana();break;
    case'renta':renderRenta();break;
    case'renta-ficha':renderRentaFicha();break;
    case'renta-cuestionario':renderCuestionario();break;
    case'config':renderConfig();break;
  }
}

// ── INIT ──────────────────────────────────
cargarDatos();
</script>
